name: Daily Pulse

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
    - cron: '0 14 * * *'
    - cron: '0 17 * * *'
    - cron: '0 20 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

env:
  GITHUB_USERNAME: "niketbhatt2002"
  CITY: "Toronto"

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Create data directory
        run: mkdir -p data logs

      - name: Fetch GitHub Stats
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python << 'EOF'
          import json, os, requests
          from datetime import datetime
          
          token = os.environ.get('GH_TOKEN')
          username = "niketbhatt2002"
          headers = {'Authorization': f'token {token}'} if token else {}
          
          try:
              user = requests.get(f'https://api.github.com/users/{username}', headers=headers).json()
              repos = requests.get(f'https://api.github.com/users/{username}/repos?per_page=100', headers=headers).json()
              
              stats = {
                  'updated_at': datetime.utcnow().isoformat() + 'Z',
                  'username': username,
                  'followers': user.get('followers', 0),
                  'following': user.get('following', 0),
                  'public_repos': user.get('public_repos', 0),
                  'total_stars': sum(r.get('stargazers_count', 0) for r in repos if isinstance(r, dict))
              }
          except:
              stats = {'updated_at': datetime.utcnow().isoformat() + 'Z', 'error': 'fetch failed'}
          
          with open('data/github-stats.json', 'w') as f:
              json.dump(stats, f, indent=2)
          print(f"Stats: {stats}")
          EOF

      - name: Fetch Tech News
        run: |
          python << 'EOF'
          import json, requests
          from datetime import datetime
          
          try:
              ids = requests.get('https://hacker-news.firebaseio.com/v0/topstories.json').json()[:5]
              stories = []
              for i in ids:
                  s = requests.get(f'https://hacker-news.firebaseio.com/v0/item/{i}.json').json()
                  if s: stories.append({'title': s.get('title',''), 'score': s.get('score',0)})
          except:
              stories = []
          
          with open('data/tech-news.json', 'w') as f:
              json.dump({'updated_at': datetime.utcnow().isoformat()+'Z', 'stories': stories}, f, indent=2)
          print(f"Fetched {len(stories)} stories")
          EOF

      - name: Fetch Quote
        run: |
          python << 'EOF'
          import json, random
          from datetime import datetime
          
          quotes = [
              {"text": "Code is like humor. When you have to explain it, it's bad.", "author": "Cory House"},
              {"text": "First, solve the problem. Then, write the code.", "author": "John Johnson"},
              {"text": "Talk is cheap. Show me the code.", "author": "Linus Torvalds"},
              {"text": "Programs must be written for people to read.", "author": "Harold Abelson"},
              {"text": "Simplicity is the soul of efficiency.", "author": "Austin Freeman"},
          ]
          q = quotes[datetime.now().timetuple().tm_yday % len(quotes)]
          
          with open('data/quote.json', 'w') as f:
              json.dump({'updated_at': datetime.utcnow().isoformat()+'Z', 'quote': q['text'], 'author': q['author']}, f, indent=2)
          print(f"Quote: {q['text']}")
          EOF

      - name: Fetch Weather
        run: |
          python << 'EOF'
          import json, requests
          from datetime import datetime
          
          try:
              url = "https://api.open-meteo.com/v1/forecast?latitude=43.65&longitude=-79.38&current=temperature_2m,weather_code"
              data = requests.get(url).json()
              weather = {
                  'updated_at': datetime.utcnow().isoformat()+'Z',
                  'location': 'Toronto, ON',
                  'temperature_c': data.get('current',{}).get('temperature_2m'),
                  'weather_code': data.get('current',{}).get('weather_code')
              }
          except:
              weather = {'updated_at': datetime.utcnow().isoformat()+'Z', 'error': 'fetch failed'}
          
          with open('data/weather.json', 'w') as f:
              json.dump(weather, f, indent=2)
          print(f"Weather: {weather}")
          EOF

      - name: Fetch Trending
        run: |
          python << 'EOF'
          import json, requests
          from datetime import datetime, timedelta
          
          try:
              week_ago = (datetime.now() - timedelta(days=7)).strftime('%Y-%m-%d')
              url = f"https://api.github.com/search/repositories?q=created:>{week_ago}&sort=stars&per_page=5"
              data = requests.get(url).json()
              repos = [{'name': r['full_name'], 'stars': r['stargazers_count']} for r in data.get('items',[])]
          except:
              repos = []
          
          with open('data/trending.json', 'w') as f:
              json.dump({'updated_at': datetime.utcnow().isoformat()+'Z', 'repos': repos}, f, indent=2)
          print(f"Trending: {len(repos)} repos")
          EOF

      - name: Update Activity Log
        run: |
          python << 'EOF'
          from datetime import datetime
          import pytz
          
          tz = pytz.timezone('America/Toronto')
          now = datetime.now(tz)
          
          entry = f"""
          ## {now.strftime('%Y-%m-%d %H:%M:%S %Z')}
          - ✅ GitHub stats updated
          - ✅ Tech news fetched  
          - ✅ Quote refreshed
          - ✅ Weather logged
          - ✅ Trending repos tracked
          ---
          """
          
          with open('logs/activity.md', 'a') as f:
              f.write(entry)
          print("Activity logged")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Auto Pulse Bot"
          git add -A
          
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          
          # Always create a commit by touching a timestamp file
          echo "Last run: $TIMESTAMP" > data/last-run.txt
          git add data/last-run.txt
          
          git commit -m "🚀 Auto Pulse Update - $TIMESTAMP" || echo "No changes"
          git push
